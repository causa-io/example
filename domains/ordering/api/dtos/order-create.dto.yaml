# yaml-language-server: $schema=https://json-schema.org/draft-07/schema

title: OrderCreateDto
type: object
description: The data needed to place a new order.
additionalProperties: false
properties:
  lines:
    type: array
    items:
      oneOf:
        - $ref: "#/$defs/OrderCreateLineDto"
    description: |-
      The books to order.
      At least one line is required.
required:
  - lines

$defs:
  OrderCreateLineDto:
    title: OrderCreateLineDto
    type: object
    description: A requested line of an order.
    additionalProperties: false
    properties:
      book:
        type: string
        format: uuid
        description: The ID of the book to order.
      quantity:
        type: integer
        description: How many copies to order.
    required:
      - book
      - quantity
