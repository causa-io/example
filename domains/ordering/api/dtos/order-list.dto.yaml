# yaml-language-server: $schema=https://json-schema.org/draft-07/schema
#
# The response DTO for listing orders: one page of a token-paginated list.
#
# A slice of items plus `nextPageQuery`, an opaque, ready-to-use query string
# (`?limit=…&readAfter=…`) the client appends to the list path to fetch the next
# page. It is `null` on the last page. The client never builds the cursor
# itself, it just follows `nextPageQuery`.

title: OrderListDto
type: object
description: A page of orders.
additionalProperties: false
properties:
  items:
    type: array
    items:
      $ref: ./order.dto.yaml
    description: The orders in this page.
  nextPageQuery:
    oneOf:
      - type: string
      - type: "null"
    description: >-
      The query string to append to the list path to fetch the next page (e.g.
      `?limit=20&readAfter=…`). Null on the last page.
required:
  - items
  - nextPageQuery
