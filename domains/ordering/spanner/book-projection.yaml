# yaml-language-server: $schema=https://json-schema.org/draft-07/schema
#
# The ordering domain subscribes to `catalog.book.v1` and maintains this local
# projection, updated by an idempotent event handler.
#
# This schema lives under `spanner/` (not `entities/`) because the projection is
# a table `ordering` owns for its own internal use / state, derived from another
# domain. It is not a first-class entity of the ordering domain.

title: BookProjection
type: object
description: >-
  A local projection of catalogue `Book` entities.
additionalProperties: false
causa:
  googleSpannerTable:
    primaryKey: [id]
properties:
  id:
    type: string
    format: uuid
    description: The unique ID of the book.
  createdAt:
    type: string
    format: date-time
    description: The date at which the book was added to the catalogue.
  updatedAt:
    type: string
    format: date-time
    # The versioned event processor compares this to skip stale/replayed events.
    description: The date at which the book was last updated.
  deletedAt:
    oneOf:
      - type: string
        format: date-time
      - type: "null"
    description: The date at which the book was removed from the catalogue.
  title:
    type: string
    description: The title of the book.
  availability:
    # A closed enum, reused across domains via a cross-file `$ref` rather than
    # redeclared. `availability` is a state machine ordering relies on to
    # validate order lines. See the "open / closed enum" pattern.
    oneOf:
      - $ref: ../../catalog/entities/book.yaml#/$defs/BookAvailability
    description: Whether the book can currently be ordered.
required:
  - id
  - createdAt
  - updatedAt
  - deletedAt
  - title
  - availability
