# yaml-language-server: $schema=../../../.causa/configuration-schema.yaml
#
# The Causa configuration at this level defines the service: its identity, the
# HTTP paths it exposes, the events that trigger it, and the resources it
# reads/writes.
#
# The infrastructure layer reads the generated form of this declaration to
# create the Cloud Run service, its Pub/Sub subscriptions, etc.

project:
  name: ordering-service
  description: The main service for the Ordering domain.
  language: typescript
  type: serviceContainer

  # The version currently deployed. Updated during the release workflow and read
  # by the infra layer.
  activeVersion: release-0.1.0

openApi:
  global:
    info:
      title: Ordering API
      description: The API for the Ordering domain in the Bookshop backend.

google:
  cloudRun:
    # The name of the Cloud Run service used to replay historical events into
    # this service's handlers. Here, backfills are directed to the internal
    # event-handler service, not to the (default) public API service.
    eventBackfillServiceName: ordering-events

serviceContainer:
  # The public HTTP API surface.
  # These map to the routes described in ../api/order.api.yaml.
  endpoints:
    http:
      - /orders

  # Triggers are non-HTTP entry points. Each creates a Pub/Sub push
  # subscription, a Cloud Scheduler job, a Cloud Tasks queue, etc. that calls
  # the service over HTTP at the given `endpoint.path`.
  # The same container serves both the public API and these handlers.
  # The infra layer deploys it twice (a public API service and an internal
  # event-handler service) — see domains/ordering/infrastructure/service.tf.
  triggers:
    # Consume the upstream catalogue: build the local BookProjection.
    # Processes `catalog.book.v1` events and idempotently updates the
    # `BookProjection` table in Spanner.
    handleBookForProjection:
      type: event
      topic: catalog.book.v1
      endpoint:
        type: http
        path: /catalog/handleBookForProjection

    # ── Mirror orders into the Firestore read model ─────────────────────────────────────
    # Subscribes to this service's OWN order events and writes the OrderDocument so the
    # customer's app gets a real-time order history.
    handleOrderForFirestore:
      type: event
      topic: ordering.order.v1
      endpoint:
        type: http
        path: /orders/handleOrderForFirestore

    # ── Synchronise a processing order with the third-party provider ────────────────────
    # Subscribes to this service's own order events, filtered to `orderProcessing`. The
    # handler calls the third-party system (e.g. a payment/fulfilment provider) and emits
    # `orderConfirmed` on success or `orderFailed` on rejection — resolving the `processing`
    # state. The subscription filter keeps this handler from seeing other order events.
    handleOrderProcessing:
      type: event
      topic: ordering.order.v1
      endpoint:
        type: http
        path: /orders/handleOrderProcessing
      google.pubSub:
        filter: attributes.eventName = "orderProcessing"

    # ── Expire stale pending orders ─────────────────────────────────────────────────────
    # A scheduled job: pending orders older than the allowed window are auto-failed.
    expirePendingOrders:
      type: cron
      schedule: every 1 hours
      endpoint:
        type: http
        path: /orders/expirePendingOrders

  # What this service produces/owns.
  # Drives infrastructure provisioning (e.g. IAM permissions).
  outputs:
    # The Pub/Sub topic(s) this service publishes to.
    eventTopics:
      - ordering.order.v1
    # The Spanner database this service owns, as `<instance>.<database>`.
    google.spanner:
      - backend.ordering
    # The Firestore collection(s) this service maintains.
    google.firestore:
      - orders
